{% extends 'base.html' %}
{% block title %}Відновлення пароля{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; text-align: center; background: white; padding: 30px; border: 3px solid var(--brand-blue); border-radius: 12px; box-shadow: 6px 6px 0px var(--brand-yellow);">
    <h2 style="color: var(--brand-blue); font-weight: 900; text-transform: uppercase;">Забули пароль?</h2>
    <p>Введіть ваш email, і ми надішлемо інструкцію для його відновлення.</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; background: var(--brand-blue); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 900; cursor: pointer; margin-top: 10px;">
            Надіслати лист
        </button>
    </form>
</div>
{% endblock %}
