{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; text-align: center; background: white; padding: 30px; border: 3px solid #27c93f; border-radius: 12px;">
    <h2>🎉 Пароль успішно змінено!</h2>
    <p>Ваш пароль було оновлено. Тепер ви можете увійти до свого кабінету.</p>
    <a href="{% url 'login' %}" style="display: inline-block; background: var(--brand-yellow); color: var(--brand-blue); padding: 12px 25px; border-radius: 8px; font-weight: 900; text-decoration: none; border: 2px solid var(--brand-blue);">
        Увійти на платформу
    </a>
</div>
{% endblock %}
