{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; text-align: center; background: white; padding: 30px; border: 3px solid var(--brand-blue); border-radius: 12px;">
    <h2>Створення нового пароля</h2>
    <p>Введіть новий пароль двічі, щоб ми могли його зберегти.</p>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; background: #27c93f; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 900; cursor: pointer;">
            Змінити пароль
        </button>
    </form>
</div>
{% endblock %}
