{% extends 'base.html' %}
{% load socialaccount %}
{% block title %}Реєстрація | ДО КВАДРАТУ{% endblock %}

{% block content %}
<style>
    /* Використовуємо ті ж стилі, що і для логіну */
    .auth-window { background-color: #ffffff; border: 3px solid var(--brand-blue); border-radius: 12px; box-shadow: 10px 10px 0px var(--brand-yellow); max-width: 420px; margin: 60px auto; overflow: hidden; }
    .auth-body { padding: 40px; }
    .auth-title { text-align: center; font-size: 2rem; margin-top: 0; margin-bottom: 30px; color: var(--brand-blue); font-weight: 900; }
    .auth-form p { text-align: left; margin-bottom: 15px; }
    .auth-form label { font-weight: 800; color: var(--brand-blue); display: block; margin-bottom: 5px; font-size: 0.85rem; text-transform: uppercase; }
    .auth-form input { width: 100%; padding: 12px; border: 2px solid var(--brand-blue); border-radius: 6px; font-family: inherit; font-weight: 600; box-sizing: border-box; background-color: #f8f9fa; color: var(--text-dark); }
    .auth-form input:focus { outline: none; border-color: var(--brand-yellow); background-color: #ffffff; }
    .btn-submit { width: 100%; background-color: var(--brand-blue); color: #ffffff; padding: 15px; border: none; border-radius: 8px; font-weight: 900; font-family: inherit; font-size: 1rem; cursor: pointer; box-shadow: 5px 5px 0px var(--brand-yellow); transition: all 0.2s; text-transform: uppercase; margin-top: 10px; }
    .btn-submit:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px var(--brand-yellow); }
    .divider { text-align: center; margin: 25px 0; font-weight: 900; color: rgba(52, 78, 134, 0.5); position: relative; }
    .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 2px; background-color: rgba(52, 78, 134, 0.2); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .btn-google { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; background-color: #ffffff; color: var(--brand-blue); padding: 12px; border: 2px solid var(--brand-blue); border-radius: 8px; font-weight: 900; text-decoration: none; box-shadow: 4px 4px 0px var(--brand-blue); transition: all 0.2s; box-sizing: border-box; }
    .btn-google:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--brand-blue); background-color: #f8f9fa; }
</style>

<div class="auth-window">
    <div style="background-color: var(--brand-blue); padding: 12px 18px; display: flex; align-items: center; gap: 8px;">
        <div style="width: 12px; height: 12px; border-radius: 50%; background-color: #ff5f56;"></div>
        <div style="width: 12px; height: 12px; border-radius: 50%; background-color: #ffbd2e;"></div>
        <div style="width: 12px; height: 12px; border-radius: 50%; background-color: #27c93f;"></div>
    </div>

    <div class="auth-body">
        <h2 class="auth-title">СТВОРЕННЯ АКАУНТУ</h2>

        <form method="POST" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">ЗАРЕЄСТРУВАТИСЯ</button>
        </form>

        <div class="divider">АБО</div>

        <!-- Кнопка Google -->
        <!-- Безпечна форма для входу через Google -->
        <form action="{% provider_login_url 'google' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="btn-google" style="font-family: inherit; font-size: 1rem;">
                <svg width="24" height="24" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                УВІЙТИ ЧЕРЕЗ GOOGLE
            </button>
        </form>

        <p style="text-align: center; margin-top: 25px; font-weight: 600; font-size: 0.9rem;">
            Вже маєте акаунт? <a href="{% url 'login' %}" style="color: var(--brand-blue); text-decoration: underline;">Увійти</a>
        </p>
    </div>
</div>
{% endblock %}
